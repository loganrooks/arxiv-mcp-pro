name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        # NOTE: no `cache: pip` here — this job installs with `uv pip install
        # --system`, which populates uv's cache (~/.cache/uv), not pip's. With
        # `cache: pip`, setup-python's post-job save errors on the empty
        # ~/.cache/pip and fails the leg. A proper uv cache is a follow-up.

    - name: Install uv (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Install uv (Windows)
      if: runner.os == 'Windows'
      run: |
        # Install uv
        iwr -useb https://astral.sh/uv/install.ps1 | iex
        # Add uv to PATH
        echo "$HOME\.uv\bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system pytest pytest-cov pytest-asyncio
        uv pip install --system -e ".[test]"

    # Run tests differently based on platform
    - name: Run tests on Linux/macOS
      if: runner.os != 'Windows'
      run: |
        pytest --cov=./ --cov-report=xml -v
        
    - name: Run tests on Windows
      if: runner.os == 'Windows' 
      run: |
        pytest --cov=./ --cov-report=xml -v

        